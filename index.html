
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="買い物リスト">
<meta name="theme-color" content="#3B6D11">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>おざわ家買い物リスト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#fff;--bg2:#f5f5f5;
  --text:#111;--text2:#555;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius-md:8px;--radius-lg:12px;
  --info-bg:#E6F1FB;--info-text:#0C447C;
  --amber-bg:#FAEEDA;--amber-text:#633806;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --info-bg:#0c2f50;--info-text:#85B7EB;
    --amber-bg:#3d2c10;--amber-text:#FAC775;
  }
}
html,body{height:100%;background:var(--bg2);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;}
.app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
.page{display:none;flex-direction:column;flex:1;overflow:hidden;}
.page.active{display:flex;}

/* topbar */
.topbar{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;border-bottom:0.5px solid var(--border);flex-shrink:0;background:var(--bg);}
.topbar-title{font-size:18px;font-weight:600;color:var(--text);flex:1;}
.topbar-back{width:38px;height:38px;border-radius:50%;border:0.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text);}

/* sync */
.sync-bar{display:flex;align-items:center;gap:6px;padding:5px 16px;background:var(--bg2);flex-shrink:0;font-size:12px;color:var(--text3);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background 0.3s;}
.sync-dot.ok{background:#639922;}
.sync-dot.err{background:#E24B4A;}
.sync-dot.loading{background:#EF9F27;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* stats + filter combined */
.stats-filter{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 16px;flex-shrink:0;border-bottom:0.5px solid var(--border);}
.sf-card{background:var(--bg2);border-radius:var(--radius-md);padding:10px 8px;text-align:center;cursor:pointer;border:1.5px solid transparent;transition:all 0.15s;user-select:none;}
.sf-card:active{opacity:0.75;}
.sf-card.active-all{border-color:var(--border2);}
.sf-card.active-urgent{border-color:var(--border2);}
.sf-card.active-normal{border-color:var(--border2);}
.sf-num{font-size:22px;font-weight:600;line-height:1;}
.sf-lbl{font-size:11px;color:var(--text2);margin-top:3px;}
.sf-all-icon{font-size:20px;line-height:1;}

/* list */
.list-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.section-hd{display:flex;align-items:center;gap:8px;padding:10px 16px 6px;position:sticky;top:0;background:var(--bg);z-index:1;}
.dot-r{width:7px;height:7px;border-radius:50%;background:#E24B4A;flex-shrink:0;}
.dot-g{width:7px;height:7px;border-radius:50%;background:#639922;flex-shrink:0;}
.sec-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);}
.sec-cnt{font-size:12px;background:var(--bg2);color:var(--text2);padding:2px 8px;border-radius:10px;}

.item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:0.5px solid var(--border);}
.chk{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.chk.ok{background:#639922;border-color:transparent;}
.item-body{flex:1;min-width:0;}
.item-name{font-size:16px;color:var(--text);line-height:1.3;}
.item-sub{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap;}
.qty-row{display:flex;align-items:center;gap:5px;}
.qbtn{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-family:inherit;}
.qnum{font-size:14px;color:var(--text2);min-width:20px;text-align:center;}
.qunit{font-size:13px;color:var(--text3);}
.ubadge{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500;white-space:nowrap;}
.ba{background:var(--info-bg);color:var(--info-text);}
.bb{background:var(--amber-bg);color:var(--amber-text);}
.delbtn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.drag-handle{width:32px;height:44px;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0;cursor:grab;touch-action:none;user-select:none;}
.item.dragging{opacity:0.35;background:var(--bg2);}
.item.drag-over{border-top:2px solid #3B6D11;}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:15px;line-height:1.8;}

/* drawer toggle bar — tall, easy to tap */
.drawer-toggle{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;border-top:none;background:#3B6D11;flex-shrink:0;cursor:pointer;user-select:none;touch-action:none;}
.drawer-toggle-left{display:flex;align-items:center;gap:10px;}
.drawer-toggle-icon{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.drawer-toggle-label{font-size:15px;font-weight:500;color:#fff;}
.drawer-toggle-arrow{font-size:18px;color:rgba(255,255,255,0.8);transition:transform 0.3s;}
.drawer-toggle-arrow.open{transform:rotate(180deg);}

/* input drawer */
.input-drawer{background:var(--bg);flex-shrink:0;overflow:hidden;transition:max-height 0.3s ease;max-height:260px;}
.input-drawer.hidden{max-height:0;}
.input-area{padding:10px 16px 12px;}
.inp-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.inp-wrap{flex:1;position:relative;display:flex;align-items:center;}
.txt-inp{width:100%;height:46px;padding:0 36px 0 14px;border:0.5px solid var(--border2);border-radius:var(--radius-md);background:var(--bg2);color:var(--text);font-size:16px;font-family:inherit;outline:none;}
.txt-inp:focus{border-color:#378ADD;}
.clear-btn{position:absolute;right:8px;width:22px;height:22px;border-radius:50%;background:var(--text3);border:none;cursor:pointer;display:none;align-items:center;justify-content:center;color:var(--bg);font-size:14px;line-height:1;}
.clear-btn.visible{display:flex;}
.mic-btn{width:46px;height:46px;border-radius:50%;border:0.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0;}
.mic-btn.rec{background:#FCEBEB;border-color:transparent;color:#A32D2D;animation:pulse 1s infinite;}
.voice-st{font-size:12px;color:var(--text2);height:16px;margin-bottom:6px;}
.qty-inp-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.qty-lbl{font-size:14px;color:var(--text2);white-space:nowrap;}
.qty-stepper{display:flex;align-items:center;gap:8px;}
.qs-btn{width:36px;height:36px;border-radius:50%;border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:inherit;}
.qs-num{width:30px;text-align:center;font-size:17px;font-weight:600;color:var(--text);}
.unit-inp{width:80px;height:36px;padding:0 10px;border:0.5px solid var(--border);border-radius:var(--radius-md);background:var(--bg2);color:var(--text2);font-size:14px;font-family:inherit;outline:none;}
.urg-row{display:flex;gap:8px;}
.urg-btn{flex:1;padding:14px;font-size:15px;border-radius:var(--radius-md);border:0.5px solid var(--border);background:transparent;cursor:pointer;font-family:inherit;color:var(--text2);font-weight:500;user-select:none;}
.urg-btn:active{opacity:0.75;}
.urg-btn.u{background:#FCEBEB;color:#A32D2D;border-color:transparent;}
.urg-btn.n{background:#EAF3DE;color:#3B6D11;border-color:transparent;}

/* hist link */
.hist-link{display:block;text-align:center;padding:13px;color:var(--info-text);font-size:14px;cursor:pointer;border-top:0.5px solid var(--border);background:var(--bg);flex-shrink:0;user-select:none;padding-bottom:max(13px,env(safe-area-inset-bottom));}
.hist-link:active{background:var(--bg2);}

/* history */
.hist-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:0.5px solid var(--border);}
.hist-body{flex:1;min-width:0;}
.hist-name{font-size:15px;color:var(--text);}
.hist-meta{font-size:12px;color:var(--text3);margin-top:3px;}
.restbtn{font-size:13px;color:var(--info-text);background:var(--info-bg);border:none;border-radius:10px;padding:8px 12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.restbtn:active{opacity:0.75;}

/* setup */
.setup-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:2rem;gap:20px;}
.setup-title{font-size:22px;font-weight:600;color:var(--text);text-align:center;}
.setup-sub{font-size:15px;color:var(--text2);text-align:center;line-height:1.6;}
.setup-btn{width:100%;padding:16px;font-size:17px;font-weight:600;border-radius:var(--radius-lg);border:none;cursor:pointer;font-family:inherit;}
.setup-btn.a{background:var(--info-bg);color:var(--info-text);}
.setup-btn.b{background:var(--amber-bg);color:var(--amber-text);}
</style>
</head>
<body>
<div class="app">

  <!-- ユーザー選択画面 -->
  <div class="page active" id="pg-setup">
    <div class="topbar"><span class="topbar-title">🛒 おざわ家買い物リスト</span></div>
    <div class="setup-screen">
      <div class="setup-title">あなたはどちらですか？</div>
      <div class="setup-sub">一度選ぶと記憶されます。<br>パートナーは別のURLから同じ選択をしてください。</div>
      <button class="setup-btn a" onclick="setUser('A')">みーさん</button>
      <button class="setup-btn b" onclick="setUser('B')">トモさん</button>
    </div>
  </div>

  <!-- メイン画面 -->
  <div class="page" id="pg-main">
    <div class="topbar">
      <span class="topbar-title">🛒 おざわ家買い物リスト</span>
      <span id="user-label" style="font-size:13px;padding:5px 12px;border-radius:20px;font-weight:500;"></span>
    </div>
    <div class="sync-bar">
      <div class="sync-dot loading" id="syncDot"></div>
      <span id="syncLabel">接続中...</span>
    </div>

    <!-- 数量カード兼フィルター -->
    <div class="stats-filter">
      <div class="sf-card active-all" id="sf-all" onclick="setFilter('all')">
        <div class="sf-all-icon">📋</div>
        <div class="sf-lbl">すべて</div>
      </div>
      <div class="sf-card" id="sf-urgent" onclick="setFilter('urgent')">
        <div class="sf-num" style="color:#E24B4A" id="cnt-urgent">0</div>
        <div class="sf-lbl">🔴 すぐ必要</div>
      </div>
      <div class="sf-card" id="sf-normal" onclick="setFilter('normal')">
        <div class="sf-num" style="color:#639922" id="cnt-normal">0</div>
        <div class="sf-lbl">🟢 急がない</div>
      </div>
    </div>

    <div class="list-area" id="main-list"></div>

    <!-- 入力トグルバー（タップしやすい高さ） -->
    <div class="drawer-toggle" id="drawerToggle" onclick="toggleDrawer()">
      <div class="drawer-toggle-left">
        <div class="drawer-toggle-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <span class="drawer-toggle-label" id="drawerLabel">商品を追加する</span>
      </div>
      <span class="drawer-toggle-arrow open" id="drawerArrow">⌃</span>
    </div>

    <div class="input-drawer" id="inputDrawer">
      <div class="input-area">
        <div class="inp-row">
          <div class="inp-wrap">
            <input class="txt-inp" id="itemInput" placeholder="商品名を入力..." autocomplete="off" oninput="onInputChange()"/>
            <button class="clear-btn" id="clearBtn" onclick="clearInput()">×</button>
          </div>
          <button class="mic-btn" id="micBtn" onclick="toggleVoice()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0014 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
          </button>
        </div>
        <div class="voice-st" id="voiceSt"></div>
        <div class="qty-inp-row">
          <span class="qty-lbl">数量：</span>
          <div class="qty-stepper">
            <button class="qs-btn" onclick="changeQty(-1)">−</button>
            <span class="qs-num" id="qtyDisp">1</span>
            <button class="qs-btn" onclick="changeQty(1)">＋</button>
          </div>
          <input class="unit-inp" id="unitInp" placeholder="単位（本…）" autocomplete="off"/>
        </div>
        <div class="urg-row">
          <button class="urg-btn u" onclick="addItem('urgent')">🔴 すぐ必要</button>
          <button class="urg-btn n" onclick="addItem('normal')">🟢 急がない</button>
        </div>
      </div>
    </div>
    <a class="hist-link" onclick="showPage('pg-history')">過去の購入済み商品を見る →</a>
  </div>

  <!-- 購入済み履歴画面 -->
  <div class="page" id="pg-history">
    <div class="topbar">
      <button class="topbar-back" onclick="showPage('pg-main')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="topbar-title">購入済み商品</span>
    </div>
    <div class="list-area" id="history-list"></div>
  </div>

</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, remove, update } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const USER_NAMES = { A: 'みーさん', B: 'トモさん' };

const app = initializeApp({
  databaseURL: 'https://shopping-list-dc581-default-rtdb.asia-southeast1.firebasedatabase.app'
});
const db = getDatabase(app);
const itemsRef = ref(db, 'items');

let currentUser = null, qty = 1, items = {}, filter = 'all';
let recognition = null, isRecording = false, drawerOpen = true;

function initUser() {
  const params = new URLSearchParams(location.search);
  const paramUser = params.get('user');
  const savedUser = localStorage.getItem('shopUser');
  if (paramUser === 'A' || paramUser === 'B') {
    currentUser = paramUser;
    localStorage.setItem('shopUser', currentUser);
    startApp();
  } else if (savedUser === 'A' || savedUser === 'B') {
    currentUser = savedUser;
    startApp();
  } else {
    showPage('pg-setup');
  }
}

window.setUser = function(u) {
  currentUser = u;
  localStorage.setItem('shopUser', u);
  startApp();
};

function startApp() {
  const label = document.getElementById('user-label');
  label.textContent = USER_NAMES[currentUser];
  label.style.background = currentUser === 'A' ? 'var(--info-bg)' : 'var(--amber-bg)';
  label.style.color = currentUser === 'A' ? 'var(--info-text)' : 'var(--amber-text)';
  showPage('pg-main');
  subscribeFirebase();
}

function subscribeFirebase() {
  setSyncStatus('loading', '接続中...');
  onValue(itemsRef, (snapshot) => {
    items = snapshot.val() || {};
    setSyncStatus('ok', '同期済み');
    render();
    if (document.getElementById('pg-history').classList.contains('active')) renderHistory();
  }, () => { setSyncStatus('err', '接続エラー'); });
}

function setSyncStatus(s, l) {
  document.getElementById('syncDot').className = 'sync-dot ' + s;
  document.getElementById('syncLabel').textContent = l;
}

// ドロワー
window.toggleDrawer = function() {
  drawerOpen = !drawerOpen;
  document.getElementById('inputDrawer').classList.toggle('hidden', !drawerOpen);
  document.getElementById('drawerArrow').classList.toggle('open', drawerOpen);
  document.getElementById('drawerLabel').textContent = drawerOpen ? '入力を閉じる' : '商品を追加する';
};

// スワイプ対応（トグルバー）
let swipeStartY = 0;
const toggle = document.getElementById('drawerToggle');
toggle.addEventListener('touchstart', e => { swipeStartY = e.touches[0].clientY; }, {passive:true});
toggle.addEventListener('touchend', e => {
  const dy = swipeStartY - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 20) {
    drawerOpen = dy > 0;
    document.getElementById('inputDrawer').classList.toggle('hidden', !drawerOpen);
    document.getElementById('drawerArrow').classList.toggle('open', drawerOpen);
    document.getElementById('drawerLabel').textContent = drawerOpen ? '入力を閉じる' : '商品を追加する';
  }
}, {passive:true});

// フィルター
window.setFilter = function(f) {
  filter = f;
  ['all','urgent','normal'].forEach(k => {
    const el = document.getElementById('sf-'+k);
    el.className = 'sf-card' + (k === f ? ' active-'+k : '');
  });
  render();
};

window.clearInput = function() {
  document.getElementById('itemInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  document.getElementById('itemInput').focus();
};

window.onInputChange = function() {
  const val = document.getElementById('itemInput').value;
  document.getElementById('clearBtn').classList.toggle('visible', val.length > 0);
};

window.changeQty = function(d) {
  qty = Math.max(1, qty + d);
  document.getElementById('qtyDisp').textContent = qty;
};

window.addItem = function(urgency) {
  const inp = document.getElementById('itemInput');
  const text = inp.value.trim();
  if (!text) return;
  const unit = document.getElementById('unitInp').value.trim();
  const now = new Date();
  const id = 'item_' + Date.now();
  setSyncStatus('loading', '同期中...');
  set(ref(db, 'items/' + id), {
    id, text, qty, unit, urgency, user: currentUser, done: false,
    ts: now.toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}),
    date: now.toLocaleDateString('ja-JP', {month:'numeric',day:'numeric'}),
    createdAt: now.getTime()
  });
  inp.value = ''; qty = 1;
  document.getElementById('qtyDisp').textContent = '1';
  document.getElementById('unitInp').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  inp.focus();
};

window.toggleDone = function(id) {
  const it = items[id]; if (!it) return;
  setSyncStatus('loading', '同期中...');
  update(ref(db, 'items/' + id), {done: !it.done});
};

window.deleteItem = function(id) {
  setSyncStatus('loading', '同期中...');
  remove(ref(db, 'items/' + id));
};

window.restoreItem = function(id) {
  setSyncStatus('loading', '同期中...');
  update(ref(db, 'items/' + id), {done: false});
};

window.updateQty = function(id, d) {
  const it = items[id]; if (!it) return;
  setSyncStatus('loading', '同期中...');
  update(ref(db, 'items/' + id), {qty: Math.max(1, (it.qty||1) + d)});
};

window.toggleVoice = function() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    document.getElementById('voiceSt').textContent = '⚠️ 音声入力非対応のブラウザです'; return;
  }
  if (isRecording) { recognition && recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR(); recognition.lang = 'ja-JP'; recognition.interimResults = true;
  recognition.onstart = () => { isRecording = true; document.getElementById('micBtn').classList.add('rec'); document.getElementById('voiceSt').textContent = '聞いています...'; };
  recognition.onresult = (e) => {
    let t = ''; for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    document.getElementById('itemInput').value = t;
    document.getElementById('voiceSt').textContent = t;
    document.getElementById('clearBtn').classList.toggle('visible', t.length > 0);
  };
  recognition.onend = () => { isRecording = false; document.getElementById('micBtn').classList.remove('rec'); document.getElementById('voiceSt').textContent = ''; };
  recognition.onerror = () => { isRecording = false; document.getElementById('micBtn').classList.remove('rec'); document.getElementById('voiceSt').textContent = '⚠️ 認識に失敗しました'; };
  recognition.start();
};

window.showPage = function(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'pg-history') renderHistory();
};

function sorted() {
  return Object.values(items).sort((a, b) => {
    const ao = a.sortOrder !== undefined ? a.sortOrder : (a.createdAt || 0);
    const bo = b.sortOrder !== undefined ? b.sortOrder : (b.createdAt || 0);
    return bo - ao;
  });
}

function card(it) {
  const isMe = it.user === currentUser;
  const name = isMe ? '自分' : USER_NAMES[it.user] || 'パートナー';
  return `<div class="item" data-id="${it.id}">
    <div class="chk${it.done?' ok':''}" onclick="toggleDone('${it.id}')">
      <svg width="13" height="11" viewBox="0 0 13 11" fill="none" stroke="${it.done?'white':'transparent'}" stroke-width="2.2"><polyline points="1 5.5 5 9.5 12 1"/></svg>
    </div>
    <div class="item-body">
      <div class="item-name">${it.text}</div>
      <div class="item-sub">
        <div class="qty-row">
          <button class="qbtn" onclick="updateQty('${it.id}',-1)">−</button>
          <span class="qnum">${it.qty||1}</span>
          <button class="qbtn" onclick="updateQty('${it.id}',1)">＋</button>
          ${it.unit?`<span class="qunit">${it.unit}</span>`:''}
        </div>
        <span class="ubadge ${it.user==='A'?'ba':'bb'}">${name}</span>
      </div>
    </div>
    <button class="delbtn" onclick="deleteItem('${it.id}')">×</button>
    <div class="drag-handle" data-drag="${it.id}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="2" rx="1"/><rect x="2" y="7" width="12" height="2" rx="1"/><rect x="2" y="12" width="12" height="2" rx="1"/></svg>
    </div>
  </div>`;
}

function render() {
  const all = sorted();
  const urgent = all.filter(i => i.urgency==='urgent' && !i.done);
  const normal = all.filter(i => i.urgency==='normal' && !i.done);
  document.getElementById('cnt-urgent').textContent = urgent.length;
  document.getElementById('cnt-normal').textContent = normal.length;

  const showUrgent = filter === 'all' || filter === 'urgent';
  const showNormal = filter === 'all' || filter === 'normal';
  let html = '';
  if (showUrgent && urgent.length) html += `<div class="section-hd"><div class="dot-r"></div><span class="sec-lbl">すぐ必要</span><span class="sec-cnt">${urgent.length}</span></div>` + urgent.map(card).join('');
  if (showNormal && normal.length) html += `<div class="section-hd"><div class="dot-g"></div><span class="sec-lbl">急がない</span><span class="sec-cnt">${normal.length}</span></div>` + normal.map(card).join('');
  if (!html) html = `<div class="empty">おざわ家買い物リストは空です<br>下のフォームから追加してください</div>`;
  document.getElementById('main-list').innerHTML = html;
  initDragAndDrop();
}

function initDragAndDrop() {
  const listEl = document.getElementById('main-list');
  let draggingEl = null, draggingId = null, startY = 0, offsetY = 0, ghost = null, longPressTimer = null;

  function getItemEls() {
    return Array.from(listEl.querySelectorAll('.item[data-id]'));
  }

  function createGhost(el) {
    ghost = el.cloneNode(true);
    ghost.style.cssText = `position:fixed;left:${el.getBoundingClientRect().left}px;width:${el.offsetWidth}px;z-index:9999;opacity:0.9;box-shadow:0 8px 24px rgba(0,0,0,0.18);border-radius:8px;background:var(--bg);pointer-events:none;transition:none;`;
    document.body.appendChild(ghost);
  }

  function moveGhost(y) {
    if (ghost) ghost.style.top = (y - offsetY) + 'px';
  }

  function getTargetEl(y) {
    return getItemEls().find(el => {
      if (el === draggingEl) return false;
      const r = el.getBoundingClientRect();
      return y < r.top + r.height / 2;
    }) || null;
  }

  function clearDragState() {
    getItemEls().forEach(el => el.classList.remove('drag-over', 'dragging'));
    if (ghost) { ghost.remove(); ghost = null; }
    draggingEl = null; draggingId = null;
  }

  // タッチイベント（長押し開始）
  listEl.addEventListener('touchstart', e => {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    draggingId = handle.dataset.drag;
    draggingEl = handle.closest('.item');
    const touch = e.touches[0];
    startY = touch.clientY;
    offsetY = touch.clientY - draggingEl.getBoundingClientRect().top;

    longPressTimer = setTimeout(() => {
      draggingEl.classList.add('dragging');
      createGhost(draggingEl);
      moveGhost(touch.clientY);
    }, 150);
  }, {passive: true});

  listEl.addEventListener('touchmove', e => {
    if (!draggingEl || !ghost) return;
    e.preventDefault();
    const touch = e.touches[0];
    moveGhost(touch.clientY);

    getItemEls().forEach(el => el.classList.remove('drag-over'));
    const target = getTargetEl(touch.clientY);
    if (target) target.classList.add('drag-over');
  }, {passive: false});

  listEl.addEventListener('touchend', e => {
    clearTimeout(longPressTimer);
    if (!draggingEl || !ghost) { clearDragState(); return; }

    const touch = e.changedTouches[0];
    const target = getTargetEl(touch.clientY);

    // 並び替えをFirebaseに保存
    const allItems = getItemEls();
    const orderedIds = allItems.map(el => el.dataset.id).filter(id => id !== draggingId);
    const targetIdx = target ? orderedIds.indexOf(target.dataset.id) : orderedIds.length;
    orderedIds.splice(targetIdx, 0, draggingId);

    // sortOrderをFirebaseに書き込む
    const now = Date.now();
    orderedIds.forEach((id, idx) => {
      const it = items[id];
      if (it) update(ref(db, 'items/' + id), { sortOrder: now - idx });
    });

    clearDragState();
  }, {passive: true});

  listEl.addEventListener('touchcancel', () => {
    clearTimeout(longPressTimer);
    clearDragState();
  }, {passive: true});
}

function renderHistory() {
  const done = sorted().filter(i => i.done);
  if (!done.length) { document.getElementById('history-list').innerHTML = `<div class="empty">購入済み商品はありません</div>`; return; }
  document.getElementById('history-list').innerHTML = done.map(it => {
    const qs = it.unit ? `${it.qty||1} ${it.unit}` : (it.qty && it.qty>1 ? String(it.qty) : '');
    const isMe = it.user === currentUser;
    const name = isMe ? '自分' : USER_NAMES[it.user] || 'パートナー';
    return `<div class="hist-item">
      <div class="hist-body">
        <div class="hist-name">${it.text}${qs?` <span style="font-size:13px;color:var(--text3)">× ${qs}</span>`:''}</div>
        <div class="hist-meta">${it.date} ${it.ts} · <span class="${it.user==='A'?'ba':'bb'}" style="padding:1px 6px;border-radius:8px;font-size:11px;">${name}</span></div>
      </div>
      <button class="restbtn" onclick="restoreItem('${it.id}')">リストに戻す</button>
    </div>`;
  }).join('');
}

initUser();
</script>
